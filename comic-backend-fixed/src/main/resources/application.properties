spring.application.name=comic-backend

# ─── Database ───
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:comic_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ───
# In production, set JWT_SECRET env var to a random string >= 32 characters.
# Generate one with: openssl rand -base64 48
# The fallback below is for local dev only. JwtUtil @PostConstruct will reject
# any secret shorter than 32 bytes, so a too-short value still fails loudly at startup.
app.jwt.secret=${JWT_SECRET:mangaverse-local-dev-secret-change-in-prod-32ch}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── OAuth2 (Google) ───
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# ─── File Upload (covers + ZIP chapters) ───
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=150MB

# ─── Server ───
server.port=8080

# ─── Email (JavaMailSender) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_USERNAME:noreply@mangaverse.com}
app.mail.enabled=${MAIL_ENABLED:false}

# ─── Frontend URL ───
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ─── Cookie ───
app.cookie.secure=${APP_COOKIE_SECURE:false}

# ─── Rate limiter ───
app.rate-limit.trusted-proxies=${TRUSTED_PROXIES:}

# ─── Token blocklist (JWT revocation) ───
app.jwt.blocklist.type=${JWT_BLOCKLIST_TYPE:memory}
