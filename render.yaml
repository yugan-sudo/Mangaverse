services:
  # 1. Spring Boot Backend API
  - type: web
    name: comic-backend
    env: docker
    plan: free
    dockerContext: ./comic-backend-fixed
    dockerfilePath: ./comic-backend-fixed/Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: comic-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: comic-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: comic-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: comic-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: comic-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_COOKIE_SECURE
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://comic-frontend.onrender.com"

  # 2. React Frontend (Vite)
  - type: web
    name: comic-frontend
    env: docker
    plan: free
    dockerContext: ./comic-frontend-new
    dockerfilePath: ./comic-frontend-new/Dockerfile
    # IMPORTANT: Vite bakes env vars at BUILD time, not runtime.
    # They must be passed as Docker build args so the Dockerfile's
    # ARG/ENV instructions can inject them before `npm run build`.
    dockerBuildArgs:
      - key: VITE_API_URL
        value: "https://mangaverse-25f5.onrender.com/api"
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
    envVars:
      - key: VITE_API_URL
        value: "https://mangaverse-25f5.onrender.com/api"
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false

databases:
  # Render Managed PostgreSQL (free tier — expires after 90 days)
  - name: comic-db
    databaseName: comic_db
    user: comic_user
    plan: free
